version: '3.8'

services:
  postgres:
    image: postgres:16.11
    container_name: pedidos-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pedidos
    networks:
      - pedidos-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: pedidos-pgadmin4
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - postgres
    networks:
      - pedidos-network

networks:
  pedidos-network:
    driver: bridge